name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project is intentionally scoped to Codex + DeepSeek. Broad provider routing, team policy, and app UI injection are usually better suited to other tools.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Protocol translation
        - Codex install/profile
        - DeepSeek thinking mode
        - Cache/report observability
        - Security/logging
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention if an existing bridge, router, or Codex app enhancement already covers this use case.
