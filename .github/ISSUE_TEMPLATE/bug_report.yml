name: Bug report
description: Report a reproducible Codex DeepSeek Bridge bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste API keys, bearer tokens, full prompt payloads, or private logs.
        Before opening an issue, please run:

        ```text
        codex-deepseek-bridge version
        codex-deepseek-bridge doctor
        codex-deepseek-bridge doctor --live
        ```

        `doctor --live` makes one real DeepSeek call, so skip it if you do not want that. After reproducing the problem, open the local report with `codex-deepseek-bridge report` or `http://localhost:8787/report` (use the port shown by `doctor` if different).
  - type: textarea
    id: health-check
    attributes:
      label: Health check
      description: Paste the redacted output of the commands above. Include `doctor --live` only if you ran it.
      placeholder: |
        codex-deepseek-bridge version
        codex-deepseek-bridge doctor
        codex-deepseek-bridge doctor --live
      render: text
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands and the smallest reproducible setup.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: "codex --version"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - WSL
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Report details or redacted logs
      description: Paste redacted error status or call metadata from the local report. Do not include API keys, bearer tokens, full prompt payloads, or private logs.
      render: text
