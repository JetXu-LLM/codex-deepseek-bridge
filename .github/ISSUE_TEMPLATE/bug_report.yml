name: Bug report
description: Report a reproducible Codex DeepSeek Bridge bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste API keys, bearer tokens, full prompt payloads, or private logs.
        Before opening an issue, please run `codex-deepseek-bridge doctor`. If you are comfortable making one real DeepSeek call, also run `codex-deepseek-bridge doctor --live`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands and the smallest reproducible setup.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: input
    id: bridge-version
    attributes:
      label: Bridge version
      placeholder: "codex-deepseek-bridge version"
    validations:
      required: true
  - type: textarea
    id: health-check
    attributes:
      label: Health check
      description: Paste the redacted output of the commands below. Include `doctor --live` only if you ran it.
      placeholder: |
        codex-deepseek-bridge version
        codex-deepseek-bridge doctor
        codex-deepseek-bridge doctor --live
      render: text
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: "codex --version"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - WSL
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Paste only redacted metadata or error output. Do not include prompt text unless it is synthetic.
      render: text
