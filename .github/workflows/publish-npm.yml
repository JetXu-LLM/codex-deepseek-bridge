name: Publish npm

# Manual only. npm publishing is never automatic; a maintainer triggers this
# deliberately after a release is verified.
on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public --tag "${{ github.event.inputs.dist-tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
